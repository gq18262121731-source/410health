### Tool-call SFT: teach the model to inspect data before answering.
model_name_or_path: Qwen/Qwen2.5-3B-Instruct
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
dataset_dir: data
dataset: reason_tool_use_demo_50,glaive_toolcall_zh_demo
template: qwen
cutoff_len: 4096
packing: true
overwrite_cache: true
preprocessing_num_workers: 4
output_dir: saves/community-agent-lora/tool-call-sft
logging_steps: 10
save_steps: 150
plot_loss: true
overwrite_output_dir: false
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.5e-4
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: false
fp16: true
