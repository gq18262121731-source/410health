default_profile: private_scene_fusion_v2

models:
  pose:
    type: pose
    framework: ultralytics
    path: yolo11n-pose.pt
    imgsz: 640
    conf: 0.2
    max_det: 8

  gru_temporal:
    type: temporal
    framework: pytorch
    path: weights/gru_pose_fall_v1.pt

  hybrid_temporal:
    type: temporal
    framework: pytorch
    path: weights/hybrid_tcn_transformer_private_real_v1.pt
    fallback_path: weights/hybrid_tcn_transformer_v2_matchgru.pt

  semantic_temporal:
    type: temporal
    framework: pytorch
    path: weights/semantic_mix_falldb_private_real_v1.pt
    fallback_path: weights/semantic_mix_falldb_v1.pt

  posture_risk:
    type: classify
    framework: ultralytics
    path: runs/yolo_posture_person_binary_cls_v1/weights/best.pt
    imgsz: 384

  fall_detector:
    type: detect
    framework: ultralytics
    path: weights/yolo_fall_detector_v1.pt
    enabled: true
    imgsz: 640
    conf: 0.25
    iou: 0.45
    fall_labels:
      - fall
      - fallen
      - lying

profiles:
  private_scene_fusion_v2:
    description: "Five-branch deployment profile. The detector branch is optional until a fall detector weight is trained."
    threshold: 0.65
    alert_hold: 3
    weights:
      gru: 0.15
      hybrid: 0.45
      semantic: 0.00
      posture: 0.30
      detector: 0.10

  public_fusion_v2:
    description: "Public held-out profile for broad dataset smoke tests."
    threshold: 0.45
    alert_hold: 3
    weights:
      gru: 0.30
      hybrid: 0.40
      semantic: 0.00
      posture: 0.20
      detector: 0.10
