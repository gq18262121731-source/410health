name: ai_health_iot_flutter
description: Flutter mobile client for the AIoT elder-care competition project.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  http: ^1.6.0
  shared_preferences: ^2.3.5
  provider: ^6.1.2
  web_socket_channel: ^3.0.3
  fl_chart: ^1.2.0
  record: ^6.2.0
  audioplayers: ^6.6.0
  path_provider: ^2.1.3
  permission_handler: ^12.0.1
  flutter_markdown: ^0.7.3
  flutter_local_notifications: ^21.0.0
  flutter_soloud: ^4.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/sos_alarm.ogg

dependency_overrides:
  record_linux: ^1.2.1
