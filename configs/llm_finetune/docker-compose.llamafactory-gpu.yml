services:
  llamafactory-gpu:
    build:
      context: D:/Program/LLaMA-Factory
      dockerfile: D:/Program/health(5-12)/configs/llm_finetune/Dockerfile.llamafactory-rtx50-cu128
      args:
        PIP_INDEX: https://pypi.org/simple
        INSTALL_DEEPSPEED: "false"
        INSTALL_VLLM: "false"
        INSTALL_LIGER: "true"
        INSTALL_UNSLOTH: "false"
    image: health-llamafactory-gpu:latest
    container_name: health-llamafactory-gpu
    ports:
      - "7861:7860"
      - "8001:8000"
    ipc: host
    tty: true
    stdin_open: true
    volumes:
      - D:/Program/LLaMA-Factory/data:/app/data
      - D:/Program/LLaMA-Factory/saves:/app/saves
      - D:/Program/LLaMA-Factory/cache:/root/.cache
      - D:/Program/health(5-12)/configs/llm_finetune:/workspace/health-configs:ro
      - D:/Program/health(5-12)/data/llm_finetune:/workspace/health-datasets:ro
      - D:/Program/health(5-12)/evals/health_llm:/workspace/health-evals:ro
    environment:
      CUDA_VISIBLE_DEVICES: "0"
      GRADIO_SERVER_NAME: "0.0.0.0"
      GRADIO_SERVER_PORT: "7860"
      HF_HOME: "/root/.cache/huggingface"
      TRANSFORMERS_CACHE: "/root/.cache/huggingface"
      HF_DATASETS_CACHE: "/root/.cache/huggingface/datasets"
    command: ["llamafactory-cli", "webui"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: "all"
              capabilities: ["gpu"]
    restart: unless-stopped
  llamafactory-gpu-devel:
    profiles: ["devel"]
    build:
      context: D:/Program/LLaMA-Factory
      dockerfile: D:/Program/health(5-12)/configs/llm_finetune/Dockerfile.llamafactory-rtx50-devel
      args:
        INSTALL_DEEPSPEED: "true"
        INSTALL_FLASH_ATTN: "false"
        INSTALL_VLLM: "false"
        INSTALL_UNSLOTH: "false"
    image: health-llamafactory-gpu-devel:latest
    container_name: health-llamafactory-gpu-devel
    ports:
      - "7862:7860"
      - "8002:8000"
    ipc: host
    tty: true
    stdin_open: true
    volumes:
      - D:/Program/LLaMA-Factory/data:/app/data
      - D:/Program/LLaMA-Factory/saves:/app/saves
      - D:/Program/LLaMA-Factory/cache:/root/.cache
      - D:/Program/health(5-12)/configs/llm_finetune:/workspace/health-configs:ro
      - D:/Program/health(5-12)/data/llm_finetune:/workspace/health-datasets:ro
      - D:/Program/health(5-12)/evals/health_llm:/workspace/health-evals:ro
    environment:
      CUDA_VISIBLE_DEVICES: "0"
      GRADIO_SERVER_NAME: "0.0.0.0"
      GRADIO_SERVER_PORT: "7860"
      HF_HOME: "/root/.cache/huggingface"
      TRANSFORMERS_CACHE: "/root/.cache/huggingface"
      HF_DATASETS_CACHE: "/root/.cache/huggingface/datasets"
      CUDA_HOME: "/usr/local/cuda"
      LD_LIBRARY_PATH: "/usr/local/cuda/lib64"
    command: ["llamafactory-cli", "webui"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: "all"
              capabilities: ["gpu"]
    restart: unless-stopped
